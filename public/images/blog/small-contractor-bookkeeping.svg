<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="675" fill="#1a365d"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4299e1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="675" fill="url(#grad1)"/>
  
  <!-- Abstract spreadsheet grid lines -->
  <g opacity="0.1" stroke="#63b3ed" stroke-width="1">
    <line x1="100" y1="100" x2="100" y2="575"/>
    <line x1="200" y1="100" x2="200" y2="575"/>
    <line x1="300" y1="100" x2="300" y2="575"/>
    <line x1="400" y1="100" x2="400" y2="575"/>
    <line x1="500" y1="100" x2="500" y2="575"/>
    <line x1="600" y1="100" x2="600" y2="575"/>
    <line x1="700" y1="100" x2="700" y2="575"/>
    <line x1="800" y1="100" x2="800" y2="575"/>
    <line x1="900" y1="100" x2="900" y2="575"/>
    <line x1="1000" y1="100" x2="1000" y2="575"/>
    <line x1="100" y1="100" x2="1000" y2="100"/>
    <line x1="100" y1="175" x2="1000" y2="175"/>
    <line x1="100" y1="250" x2="1000" y2="250"/>
    <line x1="100" y1="325" x2="1000" y2="325"/>
    <line x1="100" y1="400" x2="1000" y2="400"/>
    <line x1="100" y1="475" x2="1000" y2="475"/>
    <line x1="100" y1="550" x2="1000" y2="550"/>
  </g>
  
  <!-- Laptop/computer shape -->
  <g transform="translate(350, 150)">
    <!-- Laptop base -->
    <rect x="0" y="300" width="500" height="20" rx="5" fill="#2d3748"/>
    <!-- Laptop screen -->
    <rect x="50" y="0" width="400" height="300" rx="10" fill="#1a202c" stroke="#4a5568" stroke-width="3"/>
    <!-- Screen content -->
    <rect x="70" y="30" width="360" height="250" fill="#2d3748"/>
    <!-- Spreadsheet cells on screen -->
    <g fill="#48bb78" opacity="0.8">
      <rect x="90" y="50" width="80" height="25" rx="2"/>
      <rect x="180" y="50" width="100" height="25" rx="2"/>
      <rect x="290" y="50" width="120" height="25" rx="2"/>
    </g>
    <g fill="#4299e1" opacity="0.8">
      <rect x="90" y="85" width="80" height="25" rx="2"/>
      <rect x="180" y="85" width="100" height="25" rx="2"/>
      <rect x="290" y="85" width="120" height="25" rx="2"/>
    </g>
    <g fill="#ed8936" opacity="0.8">
      <rect x="90" y="120" width="80" height="25" rx="2"/>
      <rect x="180" y="120" width="100" height="25" rx="2"/>
      <rect x="290" y="120" width="120" height="25" rx="2"/>
    </g>
    <g fill="#9f7aea" opacity="0.8">
      <rect x="90" y="155" width="80" height="25" rx="2"/>
      <rect x="180" y="155" width="100" height="25" rx="2"/>
      <rect x="290" y="155" width="120" height="25" rx="2"/>
    </g>
    <!-- Chart on screen -->
    <rect x="90" y="200" width="150" height="70" rx="3" fill="#1a365d" opacity="0.5"/>
    <rect x="100" y="250" width="20" height="20" fill="#48bb78"/>
    <rect x="130" y="230" width="20" height="40" fill="#4299e1"/>
    <rect x="160" y="210" width="20" height="60" fill="#9f7aea"/>
    <rect x="190" y="240" width="20" height="30" fill="#ed8936"/>
  </g>
  
  <!-- Calculator icon -->
  <g transform="translate(850, 250)">
    <rect x="0" y="0" width="80" height="120" rx="5" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="20" rx="2" fill="#1a202c"/>
    <g fill="#e2e8f0">
      <rect x="10" y="40" width="15" height="15" rx="2"/>
      <rect x="32" y="40" width="15" height="15" rx="2"/>
      <rect x="54" y="40" width="15" height="15" rx="2"/>
      <rect x="10" y="62" width="15" height="15" rx="2"/>
      <rect x="32" y="62" width="15" height="15" rx="2"/>
      <rect x="54" y="62" width="15" height="15" rx="2"/>
      <rect x="10" y="84" width="15" height="15" rx="2"/>
      <rect x="32" y="84" width="15" height="15" rx="2"/>
      <rect x="54" y="84" width="15" height="15" rx="2"/>
    </g>
  </g>
  
  <!-- Receipt/Invoice icons -->
  <g transform="translate(180, 350)">
    <rect x="0" y="0" width="100" height="140" rx="3" fill="#fff" opacity="0.9"/>
    <line x1="15" y1="30" x2="85" y2="30" stroke="#cbd5e0" stroke-width="3"/>
    <line x1="15" y1="50" x2="85" y2="50" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="15" y1="65" x2="85" y2="65" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="15" y1="80" x2="85" y2="80" stroke="#e2e8f0" stroke-width="2"/>
    <line x1="15" y1="95" x2="60" y2="95" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="15" y="115" width="70" height="15" rx="2" fill="#48bb78" opacity="0.3"/>
  </g>
  
  <!-- Coffee cup -->
  <g transform="translate(950, 400)">
    <path d="M10,0 L10,50 Q10,70 30,70 L50,70 Q70,70 70,50 L70,0 Z" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <path d="M70,15 Q90,15 90,35 Q90,55 70,55" fill="none" stroke="#4a5568" stroke-width="3"/>
    <ellipse cx="40" cy="0" rx="30" ry="5" fill="#1a202c"/>
    <!-- Steam -->
    <path d="M25,-15 Q30,-25 25,-35" fill="none" stroke="#a0aec0" stroke-width="2" opacity="0.6"/>
    <path d="M40,-15 Q45,-25 40,-35" fill="none" stroke="#a0aec0" stroke-width="2" opacity="0.6"/>
    <path d="M55,-15 Q60,-25 55,-35" fill="none" stroke="#a0aec0" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Title text -->
  <text x="600" y="580" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="#fff">Small Contractor Bookkeeping</text>
  <text x="600" y="630" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#63b3ed">Excel Template &amp; Spreadsheet Guide</text>
  
  <!-- SheetCraft branding -->
  <text x="600" y="660" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#718096">SheetCraft — Excel Tools for Construction &amp; Real Estate</text>
</svg>